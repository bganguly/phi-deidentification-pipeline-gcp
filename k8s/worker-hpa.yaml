apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: phi-worker-hpa
  namespace: phi-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: phi-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
