apiVersion: apps/v1
kind: Deployment
metadata:
  name: phi-worker
  namespace: phi-pipeline
spec:
  replicas: 3
  selector:
    matchLabels:
      app: phi-worker
  template:
    metadata:
      labels:
        app: phi-worker
    spec:
      containers:
        - name: worker
          image: gcr.io/PROJECT_ID/phi-worker:latest
          envFrom:
            - configMapRef:
                name: phi-config
            - secretRef:
                name: phi-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
