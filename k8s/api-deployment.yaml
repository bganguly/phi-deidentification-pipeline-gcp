apiVersion: apps/v1
kind: Deployment
metadata:
  name: phi-api
  namespace: phi-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phi-api
  template:
    metadata:
      labels:
        app: phi-api
    spec:
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/phi-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: phi-config
            - secretRef:
                name: phi-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
